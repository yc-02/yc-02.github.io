<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="3EVYwlH80JNZN9wU8GR0-RtK64eTufMoY4xJuy3Wd_M" />
    <script src="https://kit.fontawesome.com/e3aea98539.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico?v=2">
    <title>Ying Cui</title>
    <style>
        .main-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .download-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition:
                transform 0.2s ease,
                background 0.2s ease,
                box-shadow 0.2s ease,
                border-color 0.2s ease;

        }

        .download-button:hover {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.55);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
        }

        .download-button:active {
            transform: translateY(0);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);

        }

        .download-button:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.45);
            outline-offset: 3px;

        }
    </style>

</head>

<body>
    <canvas id="bg"></canvas>
    <div class="bg-overlay"></div>
    <div class="mouse-glow"></div>
    <header class="site-header">
        <div class="header-inner">
            <div class="site-mark">
                <a href="https://yc-02.github.io/" aria-label="main page">
                    Ying Cui
                </a>
            </div>

            <div class="header-actions">
                <a href="https://github.com/yc-02" target="_blank" aria-label="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://linkedin.com/in/yingcui02" target="_blank" aria-label="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="mailto:yingcui02@gmail.com" aria-label="Email">
                    <i class="fa-solid fa-envelope"></i>
                </a>
            </div>
        </div>
    </header>
    <section class="main-section">
        <button onclick="downloadPPTX()" class="download-button">Download PPTX</button>
    </section>


    <footer class="site-footer">
        <p>© 2026 Ying Cui</p>
    </footer>

    <script src="../script.js"></script>
    <script>

        function downloadPPTX() {
            const link = document.createElement("a");
            link.href = "slides.pptx";
            link.download = "presentation.pptx";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

        }

    </script>
</body>

</html>
